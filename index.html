<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NexusConvert Pro</title>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

  <style>
    :root {
      --bg: #05050a;
      --panel: #0e0e1c;
      --card: #14141f; /* Slightly lighter to match the image UI */
      --card-hover: #1f1f2e;
      --neon: #00fff7;
      --neon-alt: #ff00ff;
      --text: #eaeaff;
      --text-dim: #8888a0;
      --success: #00ff88;
      --danger: #ff3366;
      --border: rgba(255, 255, 255, 0.1);
      --dropdown-bg: #12121a;
      --sidebar-bg: #0b0b12;
    }

    [data-theme="light"] {
      --bg: #f0f2f5;
      --panel: #ffffff;
      --card: #f0f0f5;
      --card-hover: #e0e0eb;
      --neon: #0066ff;
      --neon-alt: #cc00ff;
      --text: #1a1a2e;
      --text-dim: #666;
      --border: rgba(0, 0, 0, 0.1);
      --dropdown-bg: #ffffff;
      --sidebar-bg: #f8f9fa;
    }

    * { box-sizing: border-box; font-family: "Segoe UI", Roboto, sans-serif; }
    
    body {
      margin: 0; min-height: 100vh;
      background: var(--bg); color: var(--text);
      display: flex; flex-direction: column; align-items: center;
      padding: 20px; transition: 0.3s;
    }

    /* Layout & Base */
    .header { width: 100%; max-width: 900px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .logo { font-size: 24px; font-weight: 800; color: var(--neon); text-shadow: 0 0 10px rgba(0, 255, 247, 0.4); }
    .theme-btn { background: transparent; border: 1px solid var(--neon); color: var(--neon); padding: 8px 16px; border-radius: 8px; cursor: pointer; transition: 0.2s;}
    .theme-btn:hover { background: rgba(0, 255, 247, 0.1); }

    .grid-container {
      display: grid; grid-template-columns: 2fr 1fr; gap: 20px;
      width: 100%; max-width: 900px;
    }

    .panel {
      background: var(--panel); border-radius: 16px; padding: 24px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3); border: 1px solid var(--border);
    }

    /* Drop Zone & Queue */
    .drop-zone {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      border: 2px dashed var(--neon); border-radius: 12px; padding: 40px 20px;
      text-align: center; cursor: pointer; transition: 0.3s; background: rgba(0, 255, 247, 0.02);
      margin-bottom: 20px;
    }
    .drop-zone.active { background: rgba(0, 255, 247, 0.1); transform: scale(1.02); }
    .drop-icon { font-size: 40px; margin-bottom: 10px; }

    .queue { max-height: 250px; overflow-y: auto; padding-right: 5px; margin-bottom: 20px; }
    .queue::-webkit-scrollbar { width: 6px; }
    .queue::-webkit-scrollbar-thumb { background: var(--neon); border-radius: 3px; }
    
    .file-item {
      display: flex; justify-content: space-between; align-items: center;
      background: var(--card); padding: 12px 16px; border-radius: 8px;
      margin-bottom: 10px; border: 1px solid var(--border);
    }
    .file-info { display: flex; align-items: center; gap: 12px; }
    .file-thumb { width: 40px; height: 40px; background: var(--panel); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 20px; overflow: hidden; }
    .file-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .file-meta h4 { margin: 0 0 4px 0; font-size: 14px; }
    .file-meta p { margin: 0; font-size: 11px; color: var(--text-dim); }

    /* Modal Button */
    .mega-select-container { margin-bottom: 20px; }
    .mega-select-btn {
      width: 100%; padding: 14px; background: var(--card); color: var(--text);
      border: 1px solid var(--border); border-radius: 8px; cursor: pointer;
      display: flex; justify-content: space-between; align-items: center; font-size: 15px;
      transition: 0.2s;
    }
    .mega-select-btn:hover { border-color: var(--neon); }
    .mega-select-btn span { font-weight: bold; color: var(--neon); }

    /* Modal Structure */
    .mega-backdrop {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      background: rgba(0,0,0,0.7); backdrop-filter: blur(4px);
      z-index: 99; display: none;
    }
    .mega-backdrop.active { display: block; }

    .mega-dropdown {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 90%; max-width: 750px; max-height: 85vh;
      background: var(--dropdown-bg); border: 1px solid var(--neon); border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.8), 0 0 30px rgba(0, 255, 247, 0.2);
      z-index: 100; display: none; flex-direction: column; overflow: hidden;
    }
    .mega-dropdown.active { display: flex; animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

    @keyframes popIn {
      0% { opacity: 0; transform: translate(-50%, -45%) scale(0.95); }
      100% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    }

    .dropdown-header { 
      padding: 16px; border-bottom: 1px solid var(--border); 
      background: var(--dropdown-bg); display: flex; gap: 10px; align-items: center;
    }
    .search-icon { color: var(--text-dim); font-size: 18px; margin-left: 4px; }
    .dropdown-header input { 
      width: 100%; padding: 10px 12px; border-radius: 6px; 
      border: none; background: transparent; color: var(--text); 
      outline: none; font-size: 15px;
    }
    .close-modal-btn { background: transparent; border: none; color: var(--text-dim); font-size: 24px; cursor: pointer; padding: 0 8px; }
    .close-modal-btn:hover { color: var(--danger); }

    /* The New Split Body */
    .dropdown-split-body {
      display: flex;
      flex-grow: 1;
      height: 450px; /* Fixed internal height to prevent modal jumping */
    }

    /* Left Sidebar */
    .category-sidebar {
      width: 180px;
      background: var(--sidebar-bg);
      border-right: 1px solid var(--border);
      overflow-y: auto;
      padding: 10px 0;
    }
    .category-sidebar::-webkit-scrollbar { width: 4px; }
    .category-sidebar::-webkit-scrollbar-thumb { background: var(--text-dim); border-radius: 4px; }

    .cat-tab {
      padding: 14px 16px;
      cursor: pointer;
      font-size: 14px;
      color: var(--text-dim);
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: 0.2s;
    }
    .cat-tab:hover { background: rgba(255, 255, 255, 0.05); color: var(--text); }
    .cat-tab.active {
      color: var(--text);
      font-weight: 600;
      background: rgba(0, 255, 247, 0.05);
      border-left: 3px solid var(--neon);
    }
    .cat-tab.hidden { display: none; }

    /* Right Grid Area */
    .format-display-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--dropdown-bg);
      overflow: hidden;
    }

    .format-grid { 
      padding: 24px; 
      overflow-y: auto; 
      flex-grow: 1;
      display: grid; 
      grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); 
      gap: 12px; 
      align-content: start;
    }
    .format-grid::-webkit-scrollbar { width: 8px; }
    .format-grid::-webkit-scrollbar-thumb { background: var(--neon); border-radius: 4px; }
    
    .format-pill {
      background: var(--card); border: 1px solid var(--border); border-radius: 6px;
      padding: 14px 4px; text-align: center; font-size: 13px; cursor: pointer;
      transition: 0.2s; color: var(--text); font-weight: 600; text-transform: uppercase;
    }
    .format-pill:hover { background: var(--card-hover); border-color: var(--neon); color: var(--neon); transform: translateY(-2px);}
    .format-pill.selected { background: var(--neon); color: #000; border-color: var(--neon); }

    /* The Dedicated Description Panel (Fixes Tooltip Clipping) */
    .format-desc-panel {
      padding: 16px;
      border-top: 1px solid var(--border);
      background: var(--sidebar-bg);
      color: var(--text-dim);
      font-size: 13px;
      min-height: 50px;
      display: flex;
      align-items: center;
      transition: 0.2s;
    }
    .format-desc-panel strong { color: var(--neon); text-transform: uppercase; margin-right: 8px; font-size: 14px; }

    .dropdown-footer { padding: 16px; border-top: 1px solid var(--border); background: var(--sidebar-bg); display: flex; gap: 8px; }
    .dropdown-footer input { flex-grow: 1; padding: 12px; border-radius: 6px; border: 1px solid var(--border); background: var(--panel); color: var(--text); outline: none; }
    .dropdown-footer input:focus { border-color: var(--neon); }

    /* Buttons */
    .btn { width: 100%; padding: 14px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; text-transform: uppercase; letter-spacing: 1px; }
    .btn-primary { background: linear-gradient(90deg, var(--neon), var(--neon-alt)); color: #000; margin-top: 20px; }
    .btn-primary:hover { box-shadow: 0 0 20px rgba(0, 255, 247, 0.4); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-small { width: auto; padding: 8px 16px; font-size: 13px; background: var(--panel); color: var(--text); border: 1px solid var(--border); cursor: pointer; transition: 0.2s; border-radius: 6px;}
    .btn-small:hover { border-color: var(--neon); color: var(--neon); }
    .btn-outline { background: transparent; border: 1px solid var(--neon); color: var(--neon); }
    .btn-outline:hover { background: rgba(0, 255, 247, 0.1); }

    .badge { display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; background: rgba(0, 255, 247, 0.1); color: var(--neon); margin-bottom: 15px;}
    .history-list { font-size: 12px; color: var(--text-dim); }
    .history-item { padding: 8px 0; border-bottom: 1px dashed var(--border); }
    
    #toast { position: fixed; bottom: -50px; left: 50%; transform: translateX(-50%); background: var(--card); color: var(--neon); padding: 12px 24px; border-radius: 8px; border: 1px solid var(--neon); transition: 0.3s; box-shadow: 0 0 20px rgba(0,0,0,0.5); z-index: 1000; opacity: 0; }
    #toast.show { bottom: 20px; opacity: 1; }

    @media (max-width: 768px) { 
      .grid-container { grid-template-columns: 1fr; } 
      .dropdown-split-body { flex-direction: column; }
      .category-sidebar { width: 100%; height: auto; display: flex; overflow-x: auto; border-right: none; border-bottom: 1px solid var(--border); padding: 0;}
      .cat-tab { white-space: nowrap; border-left: none !important; border-bottom: 3px solid transparent; }
      .cat-tab.active { border-bottom: 3px solid var(--neon); }
      .cat-tab span { display: none; } /* hide arrow on mobile */
    }
  </style>
</head>
<body>

    const formatContainer = document.getElementById('formatContainer');
    
    // Modal & Split UI Elements
    const megaSelectBtn = document.getElementById('megaSelectBtn');
    const megaDropdown = document.getElementById('megaDropdown');
    const megaBackdrop = document.getElementById('megaBackdrop');
    const closeModalBtn = document.getElementById('closeModalBtn');
    
    const categorySidebar = document.getElementById('categorySidebar');
    const formatGrid = document.getElementById('formatGrid');
    const formatDescPanel = document.getElementById('formatDescPanel');
    const formatSearch = document.getElementById('formatSearch');
    
    const selectedFormatDisplay = document.getElementById('selectedFormatDisplay');
    const customFormatInput = document.getElementById('customFormatInput');
    const applyCustomBtn = document.getElementById('applyCustomBtn');

    // --- SPLIT MENU LOGIC ---
    function renderSplitMenu(searchQuery = "") {
      const query = searchQuery.toLowerCase().trim();
      
      categorySidebar.innerHTML = '';
      formatGrid.innerHTML = '';
      let hasRenderedGrid = false;
      let firstValidCategory = null;

      formatConfig.forEach((section) => {
        // Find matching formats in this category
        const filtered = section.formats.filter(f => f.id.includes(query));
        
        // Build Sidebar Tab
        const tab = document.createElement('div');
        tab.className = `cat-tab ${section.category === currentCategory ? 'active' : ''}`;
        if (filtered.length === 0) tab.classList.add('hidden'); // Hide if search finds nothing here
        
        tab.innerHTML = `${section.category} <span>›</span>`;
        tab.onclick = () => {
          currentCategory = section.category;
          renderSplitMenu(formatSearch.value);
        };
        categorySidebar.appendChild(tab);

        // Keep track of the first category that actually has search results
        if (filtered.length > 0 && !firstValidCategory) firstValidCategory = section.category;

        // Render Grid for the Active Category
        if (section.category === currentCategory && filtered.length > 0) {
          hasRenderedGrid = true;
          filtered.forEach(f => {
            const pill = document.createElement('div');
            pill.className = `format-pill ${globalTargetFormat === f.id ? 'selected' : ''}`;
            pill.innerText = f.id;
            
            // Description Hover Logic
            pill.onmouseenter = () => {
              formatDescPanel.innerHTML = `<strong>.${f.id}</strong> ${f.info}`;
              formatDescPanel.style.color = "var(--text)";
            };
            pill.onmouseleave = () => {
              formatDescPanel.innerHTML = "Hover over a format to see its details.";
              formatDescPanel.style.color = "var(--text-dim)";
            };

            pill.onclick = () => selectFormat(f.id);
            formatGrid.appendChild(pill);
          });
        }
      });

      // Smart Search: If the current tab has no results, jump to the first tab that does!
      if (!hasRenderedGrid && firstValidCategory) {
        currentCategory = firstValidCategory;
        renderSplitMenu(formatSearch.value); // Re-render with new tab selected
      } else if (!hasRenderedGrid && !firstValidCategory) {
        formatGrid.innerHTML = `<div style="grid-column: 1/-1; text-align:center; padding-top:40px; color:var(--text-dim);">No formats match your search.</div>`;
      }
    }

    function selectFormat(ext) {
      globalTargetFormat = ext.toLowerCase().replace('.', '');
      selectedFormatDisplay.innerText = `.${globalTargetFormat}`;
      closeModal();
    }

    // Modal Interactions
    function openModal() {
      megaDropdown.classList.add('active');
      megaBackdrop.classList.add('active');
      formatSearch.focus();
      
      // Auto-detect category based on uploaded file
      if(activeFiles.length > 0 && !globalTargetFormat) {
        const ext = activeFiles[0].name.split('.').pop().toLowerCase();
        for (const section of formatConfig) {
          if (section.formats.some(f => f.id === ext)) {
            currentCategory = section.category;
            break;
          }
        }
      }
      renderSplitMenu();
    }

    function closeModal() {
      megaDropdown.classList.remove('active');
      megaBackdrop.classList.remove('active');
      formatSearch.value = '';
      formatDescPanel.innerHTML = "Hover over a format to see its details.";
      renderSplitMenu();
    }

    megaSelectBtn.addEventListener('click', openModal);
    closeModalBtn.addEventListener('click', closeModal);
    megaBackdrop.addEventListener('click', closeModal);
    formatSearch.addEventListener('input', (e) => renderSplitMenu(e.target.value));

    applyCustomBtn.addEventListener('click', () => {
      const val = customFormatInput.value.trim();
      if (val) selectFormat(val);
    });
    customFormatInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter' && customFormatInput.value.trim()) selectFormat(customFormatInput.value.trim());
    });

    renderSplitMenu(); // Initialize

    // --- Standard Application Logic ---
    document.getElementById('themeToggle').addEventListener('click', (e) => {
      const isLight = document.body.getAttribute('data-theme') === 'light';
      document.body.setAttribute('data-theme', isLight ? 'dark' : 'light');
      e.target.innerText = isLight ? 'Light Mode' : 'Dark Mode';
    });

    function showToast(msg, isError = false) {
      const toast = document.getElementById('toast');
      toast.innerText = msg;
      toast.style.borderColor = isError ? 'var(--danger)' : 'var(--neon)';
      toast.style.color = isError ? 'var(--danger)' : 'var(--neon)';
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 3000);
    }

    ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(e => dropZone.addEventListener(e, prevDef));
    function prevDef(e) { e.preventDefault(); e.stopPropagation(); }
    ['dragenter', 'dragover'].forEach(e => dropZone.addEventListener(e, () => dropZone.classList.add('active')));
    ['dragleave', 'drop'].forEach(e => dropZone.addEventListener(e, () => dropZone.classList.remove('active')));

    dropZone.addEventListener('drop', (e) => handleFiles(e.dataTransfer.files));
    fileInput.addEventListener('change', (e) => handleFiles(e.target.files));

    function handleFiles(files) {
      Array.from(files).forEach(f => {
        activeFiles.push(f);
        addFileToUI(f);
      });
      if(activeFiles.length > 0) {
        startBtn.style.display = 'block';
        formatContainer.style.display = 'block';
      }
    }

    window.removeFile = function(index) {
      activeFiles.splice(index, 1);
      fileQueue.innerHTML = '';
      activeFiles.forEach((f, i) => addFileToUI(f, i));
      if(activeFiles.length === 0) {
        startBtn.style.display = 'none';
        formatContainer.style.display = 'none';
      }
    }

    function addFileToUI(file, index = activeFiles.length - 1) {
      const div = document.createElement('div');
      div.className = 'file-item';
      const isImg = file.type.startsWith('image/');
      let thumbHtml = isImg ? `<img src="${URL.createObjectURL(file)}">` : '📄';
      if(file.type.startsWith('audio/')) thumbHtml = '🎵';
      if(file.type.startsWith('video/')) thumbHtml = '🎥';
      div.innerHTML = `
        <div class="file-info"><div class="file-thumb">${thumbHtml}</div>
          <div class="file-meta"><h4>${file.name.length > 25 ? file.name.substring(0,22)+'...' : file.name}</h4>
          <p>${(file.size / 1024 / 1024).toFixed(2)} MB • ${file.type || 'Unknown'}</p></div>
        </div><button class="btn-small" onclick="removeFile(${index})">Remove</button>`;
      fileQueue.appendChild(div);
    }

    // --- ZIP and Download Logic ---
    downloadZipBtn.addEventListener('click', async () => {
      if (activeFiles.length === 0) return showToast("No files in the queue to ZIP!", true);
      showToast("Packaging files into ZIP...");
      downloadZipBtn.innerText = "Zipping...";
      downloadZipBtn.disabled = true;
      try {
        const zip = new JSZip();
        activeFiles.forEach(file => zip.file(file.name, file));
        const zipContent = await zip.generateAsync({ type: "blob" });
        downloadBlob(zipContent, "NexusConvert_Batch.zip");
        showToast("ZIP Downloaded Successfully!");
      } catch (err) {
        showToast("Failed to create ZIP.", true);
      } finally {
        downloadZipBtn.innerText = "Download Queue (ZIP)";
        downloadZipBtn.disabled = false;
      }
    });

    startBtn.onclick = async () => {
      if(activeFiles.length === 0) return;
      if(!globalTargetFormat) {
        openModal();
        return showToast("Please select a target format first!", true);
      }

      startBtn.innerText = "Processing...";
      startBtn.disabled = true;

      try {
        for(let file of activeFiles) {
          const originalName = file.name.replace(/\.[^/.]+$/, '');
          downloadBlob(new Blob([file], {type: file.type}), `${originalName}.${globalTargetFormat}`);
          logHistory(`${file.name} ➔ ${globalTargetFormat.toUpperCase()}`);
        }
        showToast("Batch Conversion Complete!");
        activeFiles = []; 
        fileQueue.innerHTML = '';
        startBtn.style.display = 'none';
        formatContainer.style.display = 'none';
      } catch (err) {
        showToast("Error processing file.", true);
      } finally {
        startBtn.innerText = "Start Conversion";
        startBtn.disabled = false;
      }
    };

    function downloadBlob(blob, filename) {
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(a.href);
    }

    function logHistory(text) {
      if(historyList.innerHTML.includes("No conversions yet")) historyList.innerHTML = '';
      const div = document.createElement('div');
      div.className = 'history-item';
      div.innerText = `✓ ${text}`;
      historyList.prepend(div);
    }
  </script>
</body>
</html>
